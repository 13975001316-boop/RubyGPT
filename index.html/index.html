<!DOCTYPE html>

<html lang="zh">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chat</title>

<style>

body{

    font-family: Arial, sans-serif;

    background:#f5f5f5;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

.chat-container{

    width:400px;

    background:white;

    border-radius:20px;

    padding:20px;

    box-shadow:0 0 20px rgba(0,0,0,0.1);

    }

h1{

    text-align:center;

}

.chat-box{

    height:300px;

    overflow-y:auto;

    border:1px solid #ddd;

    padding:10px;

    border-radius:10px;

    margin-bottom:10px;

    background:#fafafa;

}

.ai-message{

    background:#e5e5ea;

    padding:10px;

    border-radius:10px;

    margin:5px 0;

    width:fit-content;

    }

.user-message{

    background:#007aff;

    color:white;

    padding:10px;

    border-radius:10px;

    margin:5px 0;

    width:fit-content;

    margin-left:auto;

}

.input-area{

    display:flex;

    gap:10px;

}

input{

    flex:1;

    padding:10px;

    border-radius:10px;

    border:1px solid #ccc;

    }

button{

    padding:10px 15px;

    border:none;

    border-radius:10px;

    background:#007aff;

    color:white;

    cursor:pointer;

}

</style>

</head>

<body>

<div class="chat-container">

<h1>AI Chat</h1>

<div class="chat-box" id="chatBox">

    <div class="ai-message">

        Hello 👋 I am your AI Assistant

            </div>

</div>

<div class="input-area">

    <input type="text" id="userInput" placeholder="Type message...">

    <button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

function sendMessage(){

    const input = document.getElementById("userInput");

    const chatBox = document.getElementById("chatBox");

    const text = input.value.trim();

    if(text === ""){

        return;

    }

    // 用户消息

    const userMessage = document.createElement("div");

        userMessage.className = "user-message";

    userMessage.textContent = text;

    chatBox.appendChild(userMessage);

    // AI回复

    const aiMessage = document.createElement("div");

    aiMessage.className = "ai-message";

    aiMessage.textContent = "You said: " + text;

    chatBox.appendChild(aiMessage);

    // 清空输入框

    input.value = "";

    // 自动滚动到底部

    chatBox.scrollTop = chatBox.scrollHeight;

}

</script>

</body>

</html>
